apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: aicontrolplanes.gsf.io
spec:
  group: gsf.io
  names:
    kind: AIControlPlane
    listKind: AIControlPlaneList
    plural: aicontrolplanes
    singular: aicontrolplane
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                genesisAnchor:
                  type: string
                persistence:
                  type: object
                  properties:
                    backend:
                      type: string
                      enum: [sqlite, postgresql]
                    connectionString:
                      type: string
                policyConfigMap:
                  type: string
                replicas:
                  type: integer
            status:
              type: object
              properties:
                auditChainLength:
                  type: integer
                lastVerified:
                  type: string
                  format: date-time
