apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gsf.fullname" . }}
  labels:
    {{- include "gsf.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "gsf.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "gsf.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        readOnlyRootFilesystem: true
      containers:
        - name: gsf-api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8765
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          env:
            - name: GSF_PORT
              value: "8765"
            - name: GSF_DATA_PATH
              value: /app/data/gsf.db
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: policy
              mountPath: /app/config
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "gsf.fullname" . }}-data
        - name: policy
          configMap:
            name: {{ include "gsf.fullname" . }}-policy
