# PostgreSQL — horizontale Skalierung
# docker-compose -f docker-compose.yml -f docker-compose.postgres.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: orion
      POSTGRES_PASSWORD: ${ORION_DB_PASSWORD:-orion}
      POSTGRES_DB: orion
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orion"]
      interval: 5s
      timeout: 5s
      retries: 5

  orion:
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ORION_DB_URL: postgresql://orion:${ORION_DB_PASSWORD:-orion}@postgres:5432/orion

volumes:
  postgres_data:
